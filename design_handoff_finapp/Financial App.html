<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App Financeiro — Protótipo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #E8EAF0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px 60px;
      font-family: 'DM Sans', system-ui, sans-serif;
    }

    /* Subtle dot-grid backdrop */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #C8CAD4 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    /* Scroll smoothness inside the device */
    * { -webkit-overflow-scrolling: touch; }
    ::-webkit-scrollbar { display: none; }

    /* Date input cleanup */
    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.5;
      cursor: pointer;
    }

    /* Select appearance */
    select { cursor: pointer; }

    /* Button press feel */
    button:active { opacity: 0.85; }
  </style>

  <!-- React 18 + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Load order: frame → charts → data → nav → modal → screens → repasse → gestao → analise → app -->
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="navigation.jsx"></script>
  <script type="text/babel" src="modal.jsx"></script>
  <script type="text/babel" src="screens-a.jsx"></script>
  <script type="text/babel" src="screens-b.jsx"></script>
  <script type="text/babel" src="screens-c.jsx"></script>
  <script type="text/babel" src="screens-repasse.jsx"></script>
  <script type="text/babel" src="screens-gestao.jsx"></script>
  <script type="text/babel" src="screens-analise.jsx"></script>
  <script type="text/babel" src="screens-extra.jsx"></script>
  <script type="text/babel" src="screens-tools.jsx"></script>
  <script type="text/babel" src="screens-sheet.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
